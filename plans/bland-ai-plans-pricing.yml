description: >-
  Bland AI offers four published tiers — Start, Build, Scale, and Enterprise — combining flat
  per-minute talk-time pricing with monthly platform fees, and bundling LLM + STT + TTS +
  telephony into the per-minute rate. Free trial credits and a free inbound number are
  provided for new accounts.
notes: Reconciled from Bland AI's public pricing page (May 2026).
sources:
- https://www.bland.ai/pricing
plans:
- id: bland-ai-start
  name: Start
  type: usage
  description: Per-minute pricing for individuals with no monthly platform fee.
  entries:
  - label: Talk Time
    name: talk_time
    type: per_minute
    metric: minute
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: 0.14 USD/min
    userMultiplied: false
  - label: Transfer
    name: transfer
    type: per_minute
    metric: minute
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: 0.05 USD/min
    userMultiplied: false
  elements:
  - name: 10 concurrent calls
  - name: 100 calls/day
  - name: 1 voice clone
  - name: 10 knowledge bases
- id: bland-ai-build
