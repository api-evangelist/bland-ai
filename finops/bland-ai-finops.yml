serviceCategory: AI
billingModel:
  pricingCategory: Subscription + Usage (Per Minute)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Bland AI Voice Agent Platform
  ServiceCategory: AI
  ProviderName: Bland AI
  PublisherName: Bland AI
  InvoiceIssuerName: Bland AI
