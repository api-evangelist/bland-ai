meters:
- name: talk_time_minutes
  description: Per-minute charge for AI voice agent talk time (bundles LLM/STT/TTS/telephony).
  unit: minute
  aggregation: sum
  dimensions:
  - account
  - call_id
- name: transfer_minutes
  description: Per-minute charge applied while a call is transferred to a human agent.
  unit: minute
  aggregation: sum
  dimensions:
  - account
  - call_id
- name: platform_fee
  description: Monthly platform fee for paid tiers (Build, Scale).
  unit: month
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Use Bland's call analytics dashboard plus monthly invoice line items.
- name: Allocation
  description: Tag pathways and phone numbers to business units to allocate per-minute spend.
- name: Optimization
  description: Right-size the plan tier (Start vs Build vs Scale) based on actual concurrency and daily call volume.
- name: Accountability
  description: Assign a plan owner to monitor monthly burn against tier caps and trigger upgrades.
