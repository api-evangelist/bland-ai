description: >-
  FOCUS-aligned FinOps view of Bland AI. Bland bills a flat per-minute talk-time rate that
  bundles LLM, STT, TTS, and telephony costs, plus an optional monthly platform fee for paid
  tiers and per-minute transfer fees. Voice clones, knowledge bases, and concurrent call slots
  are capacity entitlements gated by plan.
notes: Bland's "flat per-minute" model removes the multi-vendor cost stack typical of voice AI; FinOps focus shifts to plan-tier sizing.
sources:
- https://www.bland.ai/pricing
- https://docs.bland.ai/
- https://focus.finops.org/focus-specification/v1-3/
